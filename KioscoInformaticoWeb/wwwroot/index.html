<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KioscoInformaticoWeb</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="KioscoInformaticoWeb.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Firebase Authentication -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <!-- Configuración de Firebase -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDzBt_1_fb3oyHKHghgJ9maWBR9rwUzCuQ",
            authDomain: "kioscoinformatico-ff93f.firebaseapp.com",
            projectId: "kioscoinformatico-ff93f",
            storageBucket: "kioscoinformatico-ff93f.firebasestorage.app",
            messagingSenderId: "144092348736",
            appId: "1:144092348736:web:df6fe13ef8db57f6ae7aa5"
        };

        firebase.initializeApp(firebaseConfig);
        console.log(firebase);
        window.firebaseAuth = {
            signInWithEmailPassword: async function (email, password) {
                try {
                    const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                    return userCredential.user.uid;
                } catch (error) {
                    console.error("Error en autenticación:", error.message);
                    return null;
                }
            },

            signOut: async function () {
                await firebase.auth().signOut();
            }
        };

        window.localStorageHelper = {
         setItem: function (key, value) {
           localStorage.setItem(key, value);
         },
         getItem: function (key) {
           return localStorage.getItem(key);
         },
         removeItem: function (key) {
           localStorage.removeItem(key);
          }
        };

    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/CurrieTechnologies.Razor.SweetAlert2/sweetAlert2.min.js"></script>
</body>

</html>
